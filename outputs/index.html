<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLIDE ARCHIVE — KISHINO MASASHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --bg2: #111110;
    --surface: #181816;
    --border: #2a2a27;
    --border-hover: #3d3d38;
    --text: #f0ede6;
    --text-muted: #7a7a72;
    --text-dim: #4a4a44;
    --accent: #e8a020;
    --accent-dim: rgba(232,160,32,0.12);
    --accent-glow: rgba(232,160,32,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* subtle grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 64px 64px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* ── HEADER ── */
  header {
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand span {
    color: var(--accent);
    font-style: italic;
  }

  .byline {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .count-badge {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 4px;
  }

  .count-badge strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* ── SEARCH ── */
  .search-bar {
    position: relative;
    margin-bottom: 32px;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
    transition: color 0.2s;
  }

  .search-bar:focus-within .search-icon {
    color: var(--accent);
  }

  #search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 16px 16px 16px 46px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.03em;
  }

  #search-input::placeholder {
    color: var(--text-dim);
  }

  #search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), inset 0 0 20px var(--accent-glow);
  }

  /* ── TAG FILTERS ── */
  .tag-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 40px;
  }

  .tag-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .tag-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tag-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .tag-btn.all {
    border-color: var(--border-hover);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.4s ease forwards;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: #1c1c1a;
    transform: translateY(-2px);
  }

  .card:hover::before { opacity: 1; }

  .card.hidden {
    display: none;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .card-num {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-num::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
    transition: color 0.2s;
  }

  .card:hover .card-title { color: var(--accent); }

  .card-desc {
    font-size: 11px;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .tag {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .card-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .card-arrow {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    transition: color 0.2s, transform 0.2s;
  }

  .card:hover .card-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }

  /* ── EMPTY STATE ── */
  .empty {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .empty.show { display: block; }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty p {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  footer p {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--accent); }

  /* staggered animation */
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="header-inner">
      <div>
        <h1 class="brand">SLIDE <span>ARCHIVE</span></h1>
        <p class="byline">KISHINO MASASHI — Presentation Library</p>
      </div>
      <div class="count-badge">
        <strong id="visible-count">0</strong> / <span id="total-count">0</span> slides
      </div>
    </div>
  </header>

  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input
      type="text"
      id="search-input"
      placeholder="タイトル・タグ・説明で検索..."
      autocomplete="off"
    >
  </div>

  <div class="tag-filters" id="tag-filters">
    <button class="tag-btn all active" data-tag="all">ALL</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <div class="empty-icon">◻</div>
    <p>No slides found</p>
  </div>

  <footer>
    <p>© 2026 KISHINO MASASHI</p>
    <p><a href="https://github.com/signal-arc-coder-masashi/slide-tools" target="_blank">GitHub →</a></p>
  </footer>

</div>

<script>
// ════════════════════════════════════════
// SLIDE DATA — 新しいスライドはここに追加
// ════════════════════════════════════════
const SLIDES = [
  {
    id: 'tjs-ga4-2026-02',
    title: 'GA4 月次レポート｜田口住生活設計室 2026年2月',
    description: '田口住生活設計室HPサイトのGA4月次分析レポート。KPIサマリー・チャネル別流入分析・人気ページランキング・作業状況・次月アクションを含む6枚構成。',
    tags: ['GA4', 'クライアント', 'レポート', 'TJS', '月次'],
    date: '2026-04-01',
    url: './tjs-ga4-2026-02/',
  },
  {
    id: 'genspark-manus',
    title: 'GenSpark・Manus スライド機能解説',
    description: 'GenSparkとManusのスライド生成機能を比較・解説するWEBスライド資料。各ツールの特性と使い分けを明るいトーンで紹介。',
    tags: ['AI', 'GenSpark', 'Manus', 'ツール比較', 'スライド'],
    date: '2026-03-25',
    url: './genspark-manus/',
  },
  {
    id: 'ai-tools',
    title: 'AIツール活用スライド',
    description: 'AIツールを業務に活用するための解説資料。実践的なユースケースと導入のポイントをまとめたスライド。',
    tags: ['AI', '活用', '業務効率化', 'ツール'],
    date: '2026-03-25',
    url: './ai-tools/',
  },
];

// ════════════════════════════════════════
// APP
// ════════════════════════════════════════
let activeTag = 'all';
let searchQuery = '';

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const searchInput = document.getElementById('search-input');
const tagFilters = document.getElementById('tag-filters');
const visibleCount = document.getElementById('visible-count');
const totalCount = document.getElementById('total-count');

// collect all unique tags
const allTags = [...new Set(SLIDES.flatMap(s => s.tags))].sort();
totalCount.textContent = SLIDES.length;

// render tag buttons
allTags.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.dataset.tag = tag;
  btn.textContent = tag;
  btn.addEventListener('click', () => {
    activeTag = tag;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterSlides();
  });
  tagFilters.appendChild(btn);
});

document.querySelector('.tag-btn.all').addEventListener('click', () => {
  activeTag = 'all';
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tag-btn.all').classList.add('active');
  filterSlides();
});

// render cards
SLIDES.forEach((slide, i) => {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = slide.url;
  card.target = '_blank';
  card.dataset.id = slide.id;
  card.dataset.tags = slide.tags.join(',').toLowerCase();
  card.dataset.search = [slide.title, slide.description, ...slide.tags].join(' ').toLowerCase();

  card.innerHTML = `
    <div class="card-num">${String(i + 1).padStart(2, '0')}</div>
    <h2 class="card-title">${slide.title}</h2>
    <p class="card-desc">${slide.description}</p>
    <div class="card-tags">
      ${slide.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="card-footer">
      <span class="card-date">${slide.date}</span>
      <span class="card-arrow">VIEW →</span>
    </div>
  `;
  grid.appendChild(card);
});

function filterSlides() {
  const q = searchQuery.toLowerCase();
  const cards = grid.querySelectorAll('.card');
  let shown = 0;

  cards.forEach(card => {
    const matchSearch = !q || card.dataset.search.includes(q);
    const matchTag = activeTag === 'all' || card.dataset.tags.split(',').includes(activeTag.toLowerCase());

    if (matchSearch && matchTag) {
      card.classList.remove('hidden');
      shown++;
    } else {
      card.classList.add('hidden');
    }
  });

  visibleCount.textContent = shown;
  empty.classList.toggle('show', shown === 0);
}

searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  filterSlides();
});

// init count
filterSlides();
</script>
</body>
</html>
